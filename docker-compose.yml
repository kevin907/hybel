services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hybel}
      POSTGRES_USER: ${POSTGRES_USER:-hybel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hybel_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hybel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    entrypoint: ["bash", "./entrypoint.sh"]
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
    volumes:
      - ./backend:/app
      - ./pyproject.toml:/app/pyproject.toml:ro
      - backend_media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgres://${POSTGRES_USER:-hybel}:${POSTGRES_PASSWORD:-hybel_dev_password}@db:5432/${POSTGRES_DB:-hybel}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=true
      - ALLOWED_HOSTS=*
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
        - BACKEND_URL=http://backend:8000
    command: node server.js
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    depends_on:
      - backend

  # ──── Lint / type-check services ────
  backend-lint:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend:/app
      - ./pyproject.toml:/app/pyproject.toml:ro
    command: >
      sh -c "ruff check . && ruff format --check . && mypy --config-file=/app/pyproject.toml ."
    profiles:
      - lint

  frontend-lint:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npx eslint . && npx tsc --noEmit && npm test -- --no-coverage"
    profiles:
      - lint

volumes:
  postgres_data:
  backend_media:
